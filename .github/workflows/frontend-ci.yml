name: Frontend CI

on:
  push:
    branches: [main, master]
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "FrontEnd/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-ci:
    name: Lint, Typecheck, Format, Test & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: FrontEnd/my-app

    steps:
      #  Checkout repo
      - uses: actions/checkout@v4

      #  Setup Node
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FrontEnd/my-app/package-lock.json

      #  Install dependencies
      - name: Install dependencies
        run: npm ci

      #  Lint
      - name: Lint
        run: npm run lint

      #  Type check (use your script )
      - name: Type check
        run: npm run typecheck

      #  Validate path aliases (important in your project)
      - name: Validate path aliases
        run: npm run validate:path-aliases

      #  Prettier formatting check
      - name: Format check
        run: npm run format:check

      #  Run tests (Vitest )
      - name: Tests
        run: npm run test

      #  Build Next.js app
      - name: Build
        run: npm run build