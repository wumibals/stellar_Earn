name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - "BackEnd/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "BackEnd/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  build-and-lint:
    name: Build, Lint & Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BackEnd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-npm-${{ hashFiles('BackEnd/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-npm-

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check "src/**/*.ts" "test/**/*.ts"

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: build-and-lint
    defaults:
      run:
        working-directory: BackEnd

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-npm-${{ hashFiles('BackEnd/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:cov

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: BackEnd/coverage/
          retention-days: 7

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-and-lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stellar_test
          POSTGRES_PASSWORD: stellar_test
          POSTGRES_DB: stellar_earn_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: BackEnd

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: stellar_test
      DB_PASSWORD: stellar_test
      DB_DATABASE: stellar_earn_test
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-npm-${{ hashFiles('BackEnd/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    if: false
    needs: build-and-lint

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stellar_test
          POSTGRES_PASSWORD: stellar_test
          POSTGRES_DB: stellar_earn_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: BackEnd

    env:
      NODE_ENV: test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_USERNAME: stellar_test
      DB_PASSWORD: stellar_test
      DB_DATABASE: stellar_earn_e2e
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-backend-npm-${{ hashFiles('BackEnd/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-backend-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run E2E tests
        run: npm run test:e2e

  backend-ci-gate:
    name: Backend CI Gate
    runs-on: ubuntu-latest
    needs: [build-and-lint, unit-tests, integration-tests]
    if: always()

    steps:
      - name: Validate all checks passed
        run: |
          build_status="${{ needs.build-and-lint.result }}"
          unit_status="${{ needs.unit-tests.result }}"
          integration_status="${{ needs.integration-tests.result }}"

          echo "Build & lint: $build_status"
          echo "Unit tests:   $unit_status"
          echo "Integration:  $integration_status"

          if [ "$build_status" != "success" ]; then
            echo "Build or lint failed"
            exit 1
          fi

          if [ "$unit_status" != "success" ]; then
            echo "Unit tests failed"
            exit 1
          fi

          if [ "$integration_status" != "success" ]; then
            echo "Integration tests failed"
            exit 1
          fi

          echo "All backend CI checks passed"
          exit 0
