name: Contract WASM Release Packaging

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  package-release:
    name: Build, package, and upload WASM release assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/earn-quest
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: contracts/earn-quest/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Build contract WASM
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Generate provenance metadata
        run: node scripts/generate-provenance.js

      - name: Validate provenance metadata
        run: node scripts/check-provenance.js

      - name: Package WASM release assets
        run: node scripts/package-release.js

      - name: Upload release assets as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: earn_quest-wasm-release
          path: contracts/earn-quest/release/**
          if-no-files-found: error
