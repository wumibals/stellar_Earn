name: Dependency Audit

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run audit weekly on Mondays at 9:00 UTC
    - cron: '0 9 * * 1'

jobs:
  changes:
    name: Detect Dependency-Relevant Changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            contracts:
              - 'contracts/**'
              - 'contracts/earn-quest/Cargo.lock'
            frontend:
              - 'FrontEnd/my-app/package.json'
              - 'FrontEnd/my-app/package-lock.json'
            backend:
              - 'BackEnd/package.json'
              - 'BackEnd/package-lock.json'

  cargo-audit:
    name: Security Audit
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        rust-version: [stable, beta]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Rust toolchain
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: ${{ matrix.rust-version }}
        components: rustfmt, clippy
        
    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-registry-
          
    - name: Cache target directory
      uses: actions/cache@v4
      with:
        path: contracts/earn-quest/target
        key: ${{ runner.os }}-cargo-target-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-target-
          
    - name: Install audit tools (cargo-binstall)
      run: |
        curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install.sh | sh
        cargo binstall -y cargo-audit cargo-deny cargo-outdated
      
    - name: Run cargo audit
      run: |
        cd contracts/earn-quest
        cargo audit
      
    - name: Run cargo-deny (advisories)
      run: |
        cd contracts/earn-quest
        cargo deny check advisories

    - name: Run cargo-deny (licenses)
      run: |
        cd contracts/earn-quest
        cargo deny check licenses
      
    - name: Check for outdated dependencies
      run: |
        cd contracts/earn-quest
        cargo outdated || echo "Outdated packages found"
        
    - name: Generate audit report
      run: |
        cd contracts/earn-quest
        echo "## Dependency Audit Report" > audit-report.md
        echo "### Rust Version: ${{ matrix.rust-version }}" >> audit-report.md
        echo "### Date: $(date)" >> audit-report.md
        echo "" >> audit-report.md
        echo "### Cargo Audit Results:" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        cargo audit >> audit-report.md 2>&1 || echo "Audit completed with warnings" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        echo "" >> audit-report.md
        echo "### Cargo Deny Advisory Results:" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        cargo deny check advisories >> audit-report.md 2>&1 || echo "Advisory deny check completed with warnings" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        echo "" >> audit-report.md
        echo "### Cargo Deny License Results:" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        cargo deny check licenses >> audit-report.md 2>&1 || echo "License deny check completed with warnings" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        echo "" >> audit-report.md
        echo "### Outdated Dependencies:" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        cargo outdated >> audit-report.md 2>&1 || echo "Outdated check completed" >> audit-report.md
        echo "\`\`\`" >> audit-report.md
        
    - name: Upload audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: audit-report-${{ matrix.rust-version }}
        path: |
          contracts/earn-quest/audit-report.md
          
    - name: Check for high vulnerabilities
      run: |
        cd contracts/earn-quest
        if cargo audit | grep -q "high\|critical"; then
          echo "❌ High or critical severity vulnerabilities found!"
          exit 1
        else
          echo "✅ No high or critical severity vulnerabilities found"
        fi

  frontend-audit:
    name: Frontend Security Audit
    needs: changes
    if: github.event_name == 'schedule' || needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: |
          FrontEnd/my-app/package.json
          BackEnd/package.json
          BackEnd/package-lock.json
          
    - name: Audit and Check Bloat - FrontEnd
      run: |
        cd FrontEnd/my-app
        npm install
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi
        npm audit --audit-level=moderate || true
        npx depcheck --json > ../../frontend-depcheck-report.json || echo "Unused dependencies found"
        
    - name: Audit and Check Bloat - Backend
      run: |
        cd BackEnd
        npm install
        npm audit --audit-level=moderate
        npx depcheck --json > ../frontend-depcheck-backend-report.json || echo "Unused dependencies found"
        
    - name: Generate frontend audit report
      run: |
        echo "## Frontend Dependency Audit Report" > frontend-audit-report.md
        echo "### Node Version: ${{ matrix.node-version }}" >> frontend-audit-report.md
        echo "### Date: $(date)" >> frontend-audit-report.md
        echo "" >> frontend-audit-report.md
        echo "### FrontEnd Audit Results:" >> frontend-audit-report.md
        echo "\`\`\`" >> frontend-audit-report.md
        cd FrontEnd/my-app && npm audit --json >> ../../frontend-audit-report.md 2>&1 || echo "Frontend audit completed" >> ../../frontend-audit-report.md
        echo "\`\`\`" >> frontend-audit-report.md
        echo "" >> frontend-audit-report.md
        echo "### Backend Audit Results:" >> frontend-audit-report.md
        echo "\`\`\`" >> frontend-audit-report.md
        cd BackEnd && npm audit --json >> ../../frontend-audit-report.md 2>&1 || echo "Backend audit completed" >> ../../frontend-audit-report.md
        echo "\`\`\`" >> frontend-audit-report.md
        
    - name: Append Depcheck Results to Report
      run: |
        echo "" >> frontend-audit-report.md
        echo "### Unused Dependency Analysis (Bloat Check):" >> frontend-audit-report.md
        echo "\`\`\`" >> frontend-audit-report.md
        cat frontend-depcheck-report.json >> frontend-audit-report.md
        echo "\`\`\`" >> frontend-audit-report.md

    - name: Upload frontend audit report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: frontend-audit-report-${{ matrix.node-version }}
        path: frontend-audit-report.md
