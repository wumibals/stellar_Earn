name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  check-contracts:
    name: Check Contract Changes
    runs-on: ubuntu-latest
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect contract-touching files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            contracts:
              - "contracts/**"
              - ".github/workflows/ci.yml"

  build-and-test:
    name: Build and Test Contracts
    needs: check-contracts
    if: needs.check-contracts.outputs.contracts == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: contracts/earn-quest
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: contracts/earn-quest/target
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('contracts/earn-quest/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-target-

      - name: Build workspace
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: License policy check
        run: |
          cargo install cargo-deny
          make license-check

      - name: Build WASM
        run: cargo build --release --target wasm32-unknown-unknown

  orphaned-scripts-check:
    name: Orphaned Scripts Check
    needs: check-contracts
    if: needs.check-contracts.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (if any)
        run: |
          if [ -f package.json ]; then npm ci || true; fi

      - name: Run orphaned-scripts detector
        run: node scripts/check-orphaned-scripts.js

  contract-checks-passed:
    name: Contract Checks Gate
    runs-on: ubuntu-latest
    needs: [check-contracts, build-and-test, orphaned-scripts-check]
    if: always()
    steps:
      - name: Check result status
        run: |
          contracts_changed="${{ needs.check-contracts.outputs.contracts }}"
          build_result="${{ needs.build-and-test.result }}"
          orphaned_result="${{ needs.orphaned-scripts-check.result }}"

          echo "Contracts changed: $contracts_changed"
          echo "Build result: $build_result"
          echo "Orphaned result: $orphaned_result"

          if [ "$contracts_changed" = "true" ]; then
            if [ "$build_result" != "success" ] || [ "$orphaned_result" != "success" ]; then
              echo "❌ Contract checks failed or were cancelled!"
              exit 1
            fi
          fi
          echo "✅ All required contract checks passed or were skipped successfully!"
          exit 0
